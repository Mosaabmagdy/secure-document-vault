<!DOCTYPE html>
<html>

<head>

    <title>Admin Panel</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>Admin Panel</h1>

    <button onclick="loadUsers()">
        Load Users
    </button>

    <br><br>

    <div id="users"></div>

</div>

<script>

const token =
localStorage.getItem('token');


if (!token) {

    alert('Access Denied');

    window.location.href =
    'login.html';
}


const payload =
JSON.parse(

    atob(
        token.split('.')[1]
    )
);


if (payload.role !== 'admin') {

    alert(
        'Forbidden: Admins Only'
    );

    window.location.href =
    'dashboard.html';
}



async function loadUsers() {

    const response =
    await fetch(

        'https://localhost:5000/api/admin/users',

        {
            headers: {

                Authorization:
                token
            }
        }
    );

    const users =
    await response.json();

    let html = '';


    users.forEach(user => {

        html += `

        <div class="doc-card">

            <h2>${user.name}</h2>

            <p>
            Email:
            ${user.email}
            </p>

            <p>
            Role:
            ${user.role}
            </p>

            <div class="actions">

                <button onclick="
                changeRole(
                    ${user.id},
                    'user'
                )
                ">
                Make User
                </button>


                <button onclick="
                changeRole(
                    ${user.id},
                    'manager'
                )
                ">
                Make Manager
                </button>


                <button onclick="
                changeRole(
                    ${user.id},
                    'admin'
                )
                ">
                Make Admin
                </button>

            </div>

        </div>
        `;
    });


    document.getElementById(
        'users'
    ).innerHTML = html;
}



async function changeRole(

    id,

    role

) {

    const response =
    await fetch(

        `https://localhost:5000/api/admin/role/${id}`,

        {

            method: 'PUT',

            headers: {

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body: JSON.stringify({

                role
            })
        }
    );

    const data =
    await response.json();

    alert(data.message);

    loadUsers();
}

</script>

</body>
</html>
