<!DOCTYPE html>
<html>

<head>

    <title>Documents</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h2>Upload Document</h2>

    <input
        type="file"
        id="file"
    >

    <button onclick="uploadFile()">
        Upload
    </button>

    <hr>

    <h2>Your Documents</h2>

    <div id="documents"></div>

</div>

<script>

async function uploadFile() {

    const file =
    document.getElementById('file')
    .files[0];

    const formData =
    new FormData();

    formData.append(
        'document',
        file
    );

    const token =
    localStorage.getItem('token');

    const response =
    await fetch(

        'https://localhost:5000/api/documents/upload',

        {
            method: 'POST',

            headers: {

                Authorization:
                token
            },

            body: formData
        }
    );

    const data =
    await response.json();

    alert(data.message);

    loadDocuments();
}



async function loadDocuments() {

    const token =
    localStorage.getItem('token');

    const response =
    await fetch(

        'https://localhost:5000/api/documents',

        {
            headers: {

                Authorization:
                token
            }
        }
    );

    const docs =
    await response.json();

    let html = '';

    docs.forEach(doc => {

        html += `

        <div class="doc-card">

            <h3>${doc.filename}</h3>

            <p>
            Uploaded:
            ${doc.uploaded_at}
            </p>

            <p>
            Size:
            ${doc.file_size} bytes
            </p>

            <button onclick="
            downloadDoc(${doc.id})
            ">
            Download
            </button>

            <button onclick="
            deleteDoc(${doc.id})
            ">
            Delete
            </button>

            <button onclick="
            verifyDoc(${doc.id})
            ">
            Verify
            </button>

        </div>
        `;
    });

    document.getElementById(
        'documents'
    ).innerHTML = html;
}


async function downloadDoc(id) {

    const token =
    localStorage.getItem('token');

    const response =
    await fetch(

        `https://localhost:5000/api/documents/download/${id}`,

        {
            headers: {

                Authorization:
                token
            }
        }
    );

    const blob =
    await response.blob();

    const url =
    window.URL.createObjectURL(blob);

    const a =
    document.createElement('a');

    a.href = url;

    a.download = 'document';

    document.body.appendChild(a);

    a.click();

    a.remove();
}


async function deleteDoc(id) {

    const token =
    localStorage.getItem('token');

    await fetch(

        `https://localhost:5000/api/documents/${id}`,

        {
            method: 'DELETE',

            headers: {

                Authorization:
                token
            }
        }
    );

    loadDocuments();
}



async function verifyDoc(id) {

    const token =
    localStorage.getItem('token');

    const response =
    await fetch(

        `https://localhost:5000/api/documents/verify/${id}`,

        {
            headers: {

                Authorization:
                token
            }
        }
    );

    const data =
    await response.json();

    if (data.valid) {

        alert(
            'Document Integrity Valid'
        );

    } else {

        alert(
            'Document Modified'
        );
    }
}


loadDocuments();

</script>

</body>

</html>
